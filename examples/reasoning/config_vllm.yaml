# FlashRL runtime/training profile only. Math-example knobs live in math.yaml.
common:
  model_name: Qwen/Qwen2.5-1.5B

training:
  num_threads: 1
  learning_rate: 1.0e-5
  batch_size: 2
  max_epochs: 1

serving:
  backend: vllm
  runtime_python: ${FLASHRL_VLLM_PYTHON}
  num_replicas: 1
  num_threads: 1
  debug_live_rollout: false

grpo:
  group_size: 2
  clip_ratio: 0.2
  kl_coefficient: 0.0
  max_new_tokens: 768
  temperature: 1.0
  top_p: 0.9
  top_k: 0
  do_sample: true

logging:
  console: true
  file: true
  console_mode: compact

metrics:
  enabled: true
  tensorboard:
    enabled: true
  pushgateway:
    enabled: false
    url: http://localhost:9091
    job_name: flashrl

runtime:
  reference_enabled: false

hooks:
  rollout_fn: examples.reasoning.train:reasoning_rollout_fn
  reward_fn: examples.reasoning.train:math_reward_fn
  dataset_fn: examples.reasoning.train:build_math_train_dataset

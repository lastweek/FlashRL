common:
  model_name: Qwen/Qwen2.5-0.5B-Instruct

training:
  num_threads: 1
  learning_rate: 1.0e-5
  batch_size: 2
  max_epochs: 1

serving:
  backend: vllm
  runtime_python: ~/.venv-vllm/bin/python
  num_replicas: 2
  num_threads: 1
  debug_live_rollout: false
  vllm_args:
    - --dtype=float16
    - --max-model-len=4096
    - --gpu-memory-utilization=0.85
    - --max-num-seqs=32
    - --enable-prefix-caching

grpo:
  group_size: 2
  clip_ratio: 0.2
  kl_coefficient: 0.0
  max_new_tokens: 256
  temperature: 1.0
  top_p: 0.9
  top_k: 0
  do_sample: true

logging:
  console: true
  file: true
  console_mode: compact

metrics:
  enabled: true
  pushgateway_url: http://localhost:9091
  job_name: flashrl

runtime:
  reference_enabled: false

hooks:
  rollout_fn: examples.reasoning.train:reasoning_rollout_fn
  reward_fn: examples.reasoning.train:reasoning_reward_fn
  dataset_fn: examples.reasoning.train:build_dataset

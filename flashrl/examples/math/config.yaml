framework:
  actor:
    model_name: Qwen/Qwen2.5-0.5B-Instruct
    backend: huggingface
    num_threads: 1

  serving:
    model_name: Qwen/Qwen2.5-0.5B-Instruct
    backend: huggingface
    num_threads: 1
    debug_live_rollout: true

  controller:
    learning_rate: 1.0e-5
    batch_size: 2
    max_epochs: 1

  grpo:
    group_size: 2
    clip_ratio: 0.2
    kl_coefficient: 0.0
    max_new_tokens: 2038
    temperature: 1.0
    top_p: 0.9
    top_k: 0
    do_sample: true

  logging:
    console: true
    file: true
    console_mode: compact

  metrics:
    enabled: true
    tensorboard:
      enabled: true
    pushgateway:
      enabled: false
      url: http://localhost:9091
      job_name: flashrl

  checkpointing:
    save_on_run_end: true

  admin:
    admin_enabled: true

  # Platform runs take math-example overrides from YAML here, not from
  # `python3 -m flashrl.examples.math.train ...` CLI flags.
  # Use these hook kwargs to control:
  # - dataset_fn.kwargs.dataset
  # - dataset_fn.kwargs.limit
  # - dataset_fn.kwargs.training_mode
  # - rollout_fn.kwargs.rollout_mode
  # rollout and reward inherit `training_mode` from prompt metadata by default,
  # so change `dataset_fn.kwargs.training_mode` once if you want the whole run
  # to switch between the default math mode and reasoning mode.
  # Supported rollout modes:
  # - whitebox = agentic/traced rollout
  # - blackbox = plain example rollout function
  hooks:
    dataset_fn:
      import: flashrl.examples.math.train:build_math_train_dataset
      kwargs:
        dataset: gsm8k
        limit: 8
        training_mode: math
    rollout_fn:
      import: flashrl.examples.math.train:build_math_rollout
      kwargs:
        rollout_mode: whitebox
    reward_fn:
      import: flashrl.examples.math.train:build_math_reward_fn
      kwargs: {}

platform:
  job:
    name: flashrl-math-demo
    namespace: default
  images:
    runtime: flashrl-runtime:dev
    serving: flashrl-serving-vllm:dev
    training: flashrl-training-fsdp:dev
  serving:
    replicas:
      min: 1
      max: 1
  rollout:
    replicas:
      min: 1
      max: 1
  reward:
    replicas:
      min: 1
      max: 1
  storage:
    checkpoints:
      uriPrefix: /shared/flashrl/checkpoints
    weights:
      uriPrefix: /shared/flashrl/weights

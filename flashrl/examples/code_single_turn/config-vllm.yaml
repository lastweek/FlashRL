framework:
  actor:
    model_name: Qwen/Qwen2.5-Coder-0.5B
    backend: huggingface
    device: cpu
    num_threads: 1

  serving:
    model_name: Qwen/Qwen2.5-Coder-0.5B
    backend: vllm
    runtime_python: ${FLASHRL_VLLM_PYTHON}
    num_replicas: 1
    num_threads: 1
    debug_live_rollout: false

  controller:
    learning_rate: 1.0e-5
    batch_size: 2
    max_epochs: 1

  grpo:
    group_size: 2
    clip_ratio: 0.2
    kl_coefficient: 0.0
    max_new_tokens: 1024
    temperature: 1.0
    top_p: 0.9
    top_k: 0
    do_sample: true

  logging:
    console: true
    file: true
    console_mode: compact

  metrics:
    enabled: true
    tensorboard:
      enabled: true
    pushgateway:
      enabled: false
      url: http://localhost:9091
      job_name: flashrl

  checkpointing:
    save_on_run_end: true

  admin:
    admin_enabled: true

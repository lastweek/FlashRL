# FlashRL runtime/training profile for the math example.
actor:
  model_name: Qwen/Qwen2.5-1.5B
  num_threads: 1

serving:
  model_name: Qwen/Qwen2.5-1.5B
  backend: vllm
  runtime_python: ${FLASHRL_VLLM_PYTHON}
  num_replicas: 1
  num_threads: 1
  debug_live_rollout: false

trainer:
  learning_rate: 1.0e-5
  batch_size: 2
  max_epochs: 1

grpo:
  group_size: 2
  clip_ratio: 0.2
  kl_coefficient: 0.0
  max_new_tokens: 768
  temperature: 1.0
  top_p: 0.9
  top_k: 0
  do_sample: true

logging:
  console: true
  file: true
  console_mode: compact

metrics:
  enabled: true
  tensorboard:
    enabled: true
  pushgateway:
    enabled: false
    url: http://localhost:9091
    job_name: flashrl

checkpointing:
  save_on_run_end: true
  final_path: /tmp/flashrl_reasoning_checkpoint.pt

admin:
  admin_enabled: true

apiVersion: apps/v1
kind: Deployment
metadata:
  name: flashrl-operator
  namespace: flashrl-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: flashrl-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: flashrl-operator
    spec:
      serviceAccountName: flashrl-operator
      containers:
      - name: operator
        image: flashrl-operator:dev
        imagePullPolicy: IfNotPresent
        command:
        - flashrl
        - platform
        - operator

apiVersion: v1
kind: ServiceAccount
metadata:
  name: flashrl-operator
  namespace: flashrl-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: flashrl-operator
rules:
- apiGroups:
  - platform.flashrl.dev
  resources:
  - flashrljobs
  - flashrljobs/status
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - ''
  resources:
  - configmaps
  - services
  - pods
  - serviceaccounts
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - apps
  resources:
  - deployments
  - statefulsets
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - rbac.authorization.k8s.io
  resources:
  - roles
  - rolebindings
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - policy
  resources:
  - poddisruptionbudgets
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - apiextensions.k8s.io
  resources:
  - customresourcedefinitions
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: flashrl-operator
subjects:
- kind: ServiceAccount
  name: flashrl-operator
  namespace: flashrl-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: flashrl-operator
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flashrl-operator
  namespace: flashrl-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: flashrl-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: flashrl-operator
    spec:
      serviceAccountName: flashrl-operator
      containers:
      - name: operator
        image: ghcr.io/flashrl/operator:latest
        command:
        - python
        - -m
        - flashrl
        - platform
        - operator
